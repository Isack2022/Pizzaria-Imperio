<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Império - Login</title>

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="shortcut icon" href="imagens/logo.png" type="image/x-icon">
    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header class="header">

        <!-- LOGO -->
        <div class="logo">
            <img src="imagens/logo.png" alt="Logo da pizzaria">
        </div>

        <!-- BOTÕES -->
        <div class="header-buttons">
            <a href="index.html">
                <button><i class="fa-solid fa-house"></i> Home</button>
            </a>
            <a href="cardapio.html">
                <button><i class="fa-solid fa-utensils"></i></i> Cardápio</button>
            </a>
        </div>

    </header>

    <!-- Conteúdo main -->
    <main>
        <!-- Formulário de Login -->
        <div class="container-form">
            <form onsubmit="return false" id="formLogin">
                <h1>Login</h1>
                <div class="input-box">
                    <i class="fa-solid fa-envelope icon"></i>
                    <input type="email" name="Email Login" placeholder="Email" id="email-Login" autocomplete="off">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock icon"></i>
                    <i class="fa-solid fa-eye-slash icon-eye"></i>
                    <input type="password" name="senha" placeholder="Senha" id="senha-Login" autocomplete="off">
                </div>
                <p><a href="recuperar-senha.html"> <i class="fa-solid fa-unlock icon"></i>Esqueci minha senha</a></p>
                <button id="login">
                    Continuar
                </button>
            </form>
        </div>

        <!-- Formulário de Login -->
        <div class="container-form">
            <form onsubmit="return false" id="formCadastro">
                <h1>Cadastro</h1>
                <div class="input-box">
                    <i class="fa-solid fa-circle-user icon"></i>
                    <input type="text" name="nome" id="nome-Cadastro" placeholder="Nome" autocomplete="off">
                </div>
                 <div class="input-box">
                    <i class="fa-solid fa-envelope icon"></i>
                    <input type="email" name="Email cadastro" id="email-Cadastro" placeholder=" Email" autocomplete="off">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-phone icon"></i>
                    <input type="tel" name="telefone" id="telefone-Cadastro" placeholder="11999999999" autocomplete="off">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock icon"></i>
                    <i class="fa-solid fa-eye-slash icon-eye"></i>
                    <input type="password" name="senha" id="senha1-Cadastro" placeholder="Senha" autocomplete="off">
                </div>
                
                <div class="input-box">
                    <i class="fa-solid fa-lock icon"></i>
                    <i class="fa-solid fa-eye-slash icon-eye"></i>
                   <input type="password" name="Confirmação de senha" id="senha2-Cadastro" placeholder="Confirmação de senha">
                </div>

                <button id="cadastrar">
                    Cadastrar
                </button>
            </form>
        </div>
    </main>


    
    <!-- FOOTER -->
    <footer class="footer">

        <!-- PARCERIAS -->
        <div class="footer-box">
            <h3>Parcerias</h3>
            <a href="https://www.formaggini.com.br/">
                <p>Formaggini</p>
            </a>
            <a href="https://centralmbrf.com.br/">
                <p>BRF (Sadia/Perdigão)</p>
            </a>
            <a href="https://www.gvinah.com.br/">
                <p>GVINAH</p>
            </a>
        </div>

        <!-- CONTATO -->
        <div class="footer-box">
            <h3>Contato</h3>
            <p><i class="fa-solid fa-map-pin"></i> Av. Campanella, 1709 - Itaquera, São Paulo - SP, 08220-831</p>
            <p><i class="fa-solid fa-phone"></i> (11) 2071-3600</p>
        </div>

        <!-- REDES SOCIAIS -->
        <div class="footer-box">
            <h3>Redes Sociais</h3>
            <a href="https://www.instagram.com/senhordo_imperio/">
                <p> <i class="fa-brands fa-instagram"></i> Instagram</p>
            </a>
            <a href="https://www.facebook.com/pizzariaimperioo?locale=pt_BR">
                <p><i class="fa-brands fa-facebook"></i> Facebook</p>
            </a>
        </div>

    </footer>

    <!-- RODAPÉ FINAL -->
    <div class="rodape">
        <p>© 2025 Pizzaria Império - Todos os direitos reservados.</p>
    </div>

    <script src="js/login.js"></script>
    <script src="https://kit.fontawesome.com/3814eee1f6.js" crossorigin="anonymous"></script>
</body>
</html>
